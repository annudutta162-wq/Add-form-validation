<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form with Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h1>📩 Contact Us</h1>
        <div class="success-msg" id="successMsg">Form Submitted Successfully! ✅</div>
        
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <small class="error" id="nameError">Name cannot be empty</small>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="text" id="email" placeholder="Enter your email">
                <small class="error" id="emailError">Please enter a valid email</small>
            </div>

            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
                <small class="error" id="messageError">Message cannot be empty</small>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
